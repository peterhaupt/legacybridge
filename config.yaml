# Local GUI agent configuration. Edit here — nothing is hardcoded in the script.

# Which model backend to use (file backends/<backend>.py). 'qwen' covers any
# JSON-emitting mlx-vlm model (Qwen3-VL, Gemma).
backend: qwen

model:
  path: "/Users/peter/models/mlx/Qwen3.5-35B-A3B-4bit"
  max_tokens: 512
  temperature: 0.0          # deterministic: we want reliable actions, not creativity
  coord_space: "normalized" # how the model reports coords: logical | image | normalized.
                            # Qwen3.5 emits 0..1000 over the image; treating it as
                            # "logical" made every narrow target miss by ~0.66x (wide
                            # tree/dialog rows got hit anyway). Verified against two
                            # toolbar icons: 328->496 (actual 493), 949->1435 (1430).

# macOS app to bring to the front before acting, so we never rely on manual
# window focus. Must match the running process name (see menu bar).
target_app: "tryton"
focus_delay: 1.5            # seconds to wait after activating the app before screenshotting

loop:
  start_delay: 0            # extra seconds before the first screenshot (focus is now automatic)
  max_steps: 30             # hard stop so a confused model can't run forever
  delay_after_action: 1.2   # seconds to wait for the UI to react before the next screenshot

screenshots:
  dir: "runs"               # each step's screenshot is saved here for debugging

# Labeled coordinate grid drawn onto each screenshot before it goes to Gemma.
# Labels are in LOGICAL coords (the space the model outputs), so it can read
# precise x/y off the lines. Tune spacing if clicks are imprecise.
grid:
  enabled: false
  spacing: 100             # logical px between gridlines
  font_size: 40            # px in the full-res screenshot (survives the model's downscale)

# The instruction the model gets every step. {task} and {history} are filled in by the script.
system_prompt: |
  You are a desktop automation agent controlling a computer by looking at a screenshot.
  Your task: {task}

  Look at the screenshot and decide the SINGLE next action to make progress.
  Coordinates are pixels in the screenshot, origin top-left. Aim at the exact
  center of the target (e.g. the middle of a menu row's text).

  FIRST check whether the task is already complete: read the breadcrumb / active
  tab title at the top of the content area. If it already shows the target view,
  reply with action "done". Never repeat an action that already succeeded.

  Reply with ONLY one JSON object, no prose, in this exact shape:
  {"thought": "<one short sentence>", "action": "<one of: click|double_click|right_click|type|hotkey|scroll|wait|done>", "x": <int>, "y": <int>, "text": "<for type>", "keys": ["cmd","s"], "amount": <int for scroll, negative=down>, "reason": "<only for done>"}

  Rules:
  - click/double_click/right_click need x,y.
  - type needs text (it types at the current focus; click the field first in a prior step).
  - hotkey needs keys, e.g. ["cmd","s"].
  - scroll needs amount.
  - Use "done" only when the task is fully complete.
  - One action per reply. Do not repeat an action that already happened.

  Actions taken so far:
  {history}

# Used by the deterministic workflow runner (--workflow). The harness owns the
# step sequence; the model is asked ONLY to locate a described target and return
# its pixel coordinates. {target} is filled in per click step.
locate_prompt: |
  You are looking at a screenshot of a desktop application (the Tryton ERP).
  Find this exact on-screen element: {target}

  Reply with ONLY one JSON object, no prose, giving the pixel coordinates of the
  CENTER of that element (origin top-left):
  {"x": <int>, "y": <int>}

  Aim at the exact center of the element. If it is a row of text, aim at the
  middle of the text. If it is a small toolbar icon, aim at the icon's center.
